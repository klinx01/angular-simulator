<div class="modal-wrapper">
  <form [formGroup]="postDialogForm">
    <div class="form-group">
      <label>Заголовок</label>
      <input id="post-title" formControlName="title" placeholder="Введите заголовок" />
    </div>
    <div class="form-group">
      <label>Теги</label>
      <input id="post-tags" formControlName="tags" placeholder="Через запятую..." />
    </div>
    <div class="form-group">
      <label>Просмотры</label>
      <input id="post-views" type="number" formControlName="views" />
    </div>
    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onClose()">Отмена</button>
      <button type="submit" class="btn-primary" (click)="onSubmit()">Сохранить</button>
    </div>
  </form>
</div>
