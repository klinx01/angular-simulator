<div class="form-container">
  <form class="input-bg" [formGroup]="userForm">
    <div>
      <label for="name">Name</label>
      <div appGradientBorderDirective class="input-wrapper">
        <input formControlName="name" id="name" />
      </div>
    </div>
    <div>
      <label for="username">Username</label>
      <div appGradientBorderDirective class="input-wrapper">
        <input formControlName="username" id="username" />
      </div>
    </div>
    <div>
      <label for="email">Email</label>
      <div appGradientBorderDirective class="input-wrapper">
        <input formControlName="email" id="email" />
      </div>
    </div>
    <div>
      <label for="phone">Phone</label>
      <div appGradientBorderDirective class="input-wrapper">
        <input formControlName="phone" type="tel" id="phone" />
      </div>
    </div>
    <div>
      <label for="website">Website</label>
      <div appGradientBorderDirective class="input-wrapper">
        <input formControlName="website" id="website" />
      </div>
    </div>
    <div formGroupName="address">
      <div>
        <label for="city">City</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="city" id="city" />
        </div>
      </div>
      <div>
        <label for="street">Street</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="street" id="street" />
        </div>
      </div>
      <div>
        <label for="suite">Suite</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="suite" id="suite" />
        </div>
      </div>
      <div>
        <label for="zipcode">Zipcode</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="zipcode" id="zipcode" />
        </div>
      </div>
      <div formGroupName="geo">
        <div>
          <label for="lat">lat</label>
          <div appGradientBorderDirective class="input-wrapper">
            <input formControlName="lat" id="lat" />
          </div>
        </div>
        <div>
          <label for="lng">lng</label>
          <div appGradientBorderDirective class="input-wrapper">
            <input formControlName="lng" id="lng" />
          </div>
        </div>
      </div>
    </div>
    <div formGroupName="company">
      <div>
        <label for="company-name">Company name</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="name" id="company-name" />
        </div>
      </div>
      <div>
        <label for="mission">Mission</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="catchPhrase" id="catchPhrase" />
        </div>
      </div>
      <div>
        <label for="specialization">Specialization</label>
        <div appGradientBorderDirective class="input-wrapper">
          <input formControlName="bs" id="bs" />
        </div>
      </div>
    </div>
  </form>
  <button
    id="user-form-btn"
    type="submit"
    (click)="onSubmit()"
    [disabled]="userForm.invalid"
    appHoverWeight
  >
    Отправить
  </button>
</div>
